name: Deploy TypeDoc to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-typedoc:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui4vega_react
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui4vega_react/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeDoc
        run: npm run doc

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gui4vega_react/doc

      - name: Deploy TypeDoc to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
